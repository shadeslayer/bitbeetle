<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbox — BitBeetle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#f4f3ec', 'cream-light': '#fbfaf7', 'cream-dark': '#ede9df',
            ink: '#17100e', 'ink-secondary': '#4a403a', 'ink-tertiary': '#8a7e78', 'ink-faint': '#c8c0ba',
            navy: '#07070f', 'navy-mid': '#0e0d1a', 'navy-card': '#13121f', 'navy-border': '#1e1c2e', 'navy-muted': '#2a2840',
            purple: '#7c3aed', 'purple-light': '#a78bfa', 'purple-bright': '#8b5cf6',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="assets/css/bitbeetle.css">
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/dashboard-data.js"></script>
  <script src="assets/js/openrouter.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    html, body { height: 100%; overflow: hidden; }

    /* 4-panel layout */
    .db-layout {
      display: grid;
      grid-template-columns: 48px 240px 300px 1fr 360px;
      height: 100vh;
      overflow: hidden;
    }

    /* Panel shared styles */
    .db-panel {
      height: 100vh;
      overflow-y: auto;
      border-right: 1px solid var(--border-subtle);
    }

    /* Icon nav */
    .db-icon-nav {
      background: var(--bg-surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-3) 0;
      gap: var(--space-1);
      border-right: 1px solid var(--border-subtle);
    }
    .db-icon-nav .nav-icon-btn {
      width: 36px; height: 36px;
      border-radius: var(--radius-md);
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--duration-fast), color var(--duration-fast);
      position: relative;
    }
    .db-icon-nav .nav-icon-btn:hover { background: var(--border-subtle); color: var(--text-primary); }
    .db-icon-nav .nav-icon-btn.active { background: var(--border-subtle); color: var(--accent); }
    .db-icon-nav .nav-spacer { flex: 1; }

    /* Sidebar */
    .db-sidebar { background: var(--bg-surface); padding: 0; }
    .db-sidebar-header {
      padding: var(--space-4) var(--space-4) var(--space-3);
      border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: space-between;
    }
    .db-sidebar-title {
      font-family: var(--font-sans); font-size: var(--text-md);
      font-weight: 800; color: var(--text-primary); letter-spacing: -0.02em;
    }
    .sidebar-section-label {
      font-family: var(--font-mono); font-size: var(--text-xs);
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-muted); font-weight: 500;
      padding: var(--space-4) var(--space-4) var(--space-2);
    }
    .sidebar-item {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-2) var(--space-4);
      cursor: pointer; border-radius: 0;
      color: var(--text-secondary); font-size: var(--text-sm);
      transition: background var(--duration-fast), color var(--duration-fast);
      position: relative;
    }
    .sidebar-item:hover { background: var(--border-subtle); color: var(--text-primary); }
    .sidebar-item.active {
      background: var(--border-subtle); color: var(--text-primary); font-weight: 600;
      border-left: 3px solid var(--accent);
    }
    .sidebar-item .item-count {
      margin-left: auto;
      font-family: var(--font-mono); font-size: var(--text-xs);
      color: var(--text-muted); font-weight: 600;
    }
    .sidebar-item.active .item-count { color: var(--text-secondary); }

    /* Conversation list */
    .db-conv-list { background: var(--bg-elevated); }
    .db-conv-header {
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--bg-elevated); z-index: 5;
    }
    .conv-filter-tabs {
      display: flex; gap: var(--space-1); padding: var(--space-2) var(--space-4);
      border-bottom: 1px solid var(--border-subtle);
    }
    .conv-filter-tab {
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-xs); font-weight: 600;
      cursor: pointer; border: none;
      background: transparent; color: var(--text-muted);
      transition: background var(--duration-fast), color var(--duration-fast);
    }
    .conv-filter-tab:hover { background: var(--border-subtle); color: var(--text-primary); }
    .conv-filter-tab.active { background: var(--ink); color: white; }
    [data-theme="dark"] .conv-filter-tab.active { background: var(--purple); }

    .conv-card {
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background var(--duration-fast);
      position: relative;
    }
    .conv-card:hover { background: var(--bg-surface); }
    .conv-card.selected {
      background: var(--cream-dark);
      border-left: 3px solid var(--accent);
    }
    [data-theme="dark"] .conv-card.selected { background: var(--navy-muted); }
    .conv-card-top { display: flex; align-items: flex-start; gap: var(--space-3); }
    .conv-card-meta { flex: 1; min-width: 0; }
    .conv-card-name {
      font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 700;
      color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: center; justify-content: space-between; gap: var(--space-2);
    }
    .conv-card-time { font-size: var(--text-xs); color: var(--text-muted); flex-shrink: 0; }
    .conv-card-preview {
      font-size: var(--text-xs); color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }
    .conv-card-badges { display: flex; gap: var(--space-2); margin-top: var(--space-2); flex-wrap: wrap; }
    .unread-dot {
      position: absolute; top: var(--space-4); right: var(--space-4);
      width: 8px; height: 8px; background: var(--accent);
      border-radius: var(--radius-full);
    }

    /* Thread panel */
    .db-thread { background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .db-thread-header {
      padding: var(--space-3) var(--space-5);
      border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; gap: var(--space-3);
      background: var(--bg-elevated); flex-shrink: 0;
    }
    .db-thread-messages {
      flex: 1; overflow-y: auto;
      padding: var(--space-5);
      display: flex; flex-direction: column; gap: var(--space-4);
    }
    .msg-row { display: flex; gap: var(--space-3); align-items: flex-end; }
    .msg-row.customer { align-self: flex-start; }
    .msg-row.agent, .msg-row.ai-draft { align-self: flex-end; flex-direction: row-reverse; }
    .msg-bubble-wrap { max-width: 75%; }
    .msg-sender {
      font-size: var(--text-xs); font-weight: 600; color: var(--text-muted);
      margin-bottom: var(--space-1);
    }
    .msg-row.agent .msg-sender, .msg-row.ai-draft .msg-sender { text-align: right; }
    .msg-time { font-size: var(--text-xs); color: var(--text-muted); margin-top: var(--space-1); }
    .msg-row.agent .msg-time, .msg-row.ai-draft .msg-time { text-align: right; }

    /* Compose area */
    .db-compose {
      flex-shrink: 0;
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-elevated);
    }
    .compose-tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 var(--space-4);
    }
    .compose-tab {
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm); font-weight: 600;
      color: var(--text-muted); cursor: pointer;
      border: none; background: transparent;
      border-bottom: 2px solid transparent;
      transition: color var(--duration-fast), border-color var(--duration-fast);
      display: flex; align-items: center; gap: var(--space-2);
    }
    .compose-tab:hover { color: var(--text-primary); }
    .compose-tab.active { color: var(--text-primary); border-bottom-color: var(--accent); }
    .compose-body { padding: var(--space-3) var(--space-4); }
    .compose-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-2) var(--space-4) var(--space-3);
    }
    .toolbar-icons { display: flex; gap: var(--space-2); }
    .toolbar-icon-btn {
      width: 28px; height: 28px; border-radius: var(--radius-sm);
      border: none; background: transparent; color: var(--text-muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background var(--duration-fast);
    }
    .toolbar-icon-btn:hover { background: var(--border-subtle); color: var(--text-primary); }

    /* Right panel */
    .db-right { background: var(--bg-elevated); display: flex; flex-direction: column; }
    .db-right-tabs {
      display: flex; border-bottom: 1px solid var(--border-subtle);
      padding: 0; flex-shrink: 0; background: var(--bg-elevated);
      position: sticky; top: 0; z-index: 5;
    }
    .db-right-tab {
      flex: 1; padding: var(--space-4);
      font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 600;
      color: var(--text-muted); cursor: pointer;
      border: none; background: transparent;
      border-bottom: 2px solid transparent;
      transition: color var(--duration-fast), border-color var(--duration-fast);
    }
    .db-right-tab:hover { color: var(--text-primary); }
    .db-right-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .db-right-content { flex: 1; overflow-y: auto; padding: var(--space-4); }
    .detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: var(--space-2) 0; font-size: var(--text-sm);
    }
    .detail-label { color: var(--text-muted); font-weight: 500; }
    .detail-value { color: var(--text-primary); font-weight: 600; text-align: right; }
    .detail-section {
      border-top: 1px solid var(--border-subtle); padding-top: var(--space-4); margin-top: var(--space-4);
    }
    .detail-section-title {
      font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 700;
      color: var(--text-primary); margin-bottom: var(--space-3);
      display: flex; align-items: center; gap: var(--space-2);
    }

    /* AI typing indicator */
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; animation: blink 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    /* Empty state */
    .empty-thread {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: var(--space-12); text-align: center; color: var(--text-muted);
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--radius-full); }
  </style>
</head>
<body>
<div x-data="dashboard()" x-init="init()" :data-theme="theme">

<div class="db-layout">

  <!-- Panel 1: Icon Nav -->
  <div class="db-icon-nav">
    <a href="index.html" style="text-decoration:none;margin-bottom:var(--space-2);" title="Home">
      <div style="font-size:1.3rem;line-height:1;padding:4px;">🪲</div>
    </a>
    <button class="nav-icon-btn" :class="{ active: activeNav === 'inbox' }" @click="activeNav='inbox'" title="Inbox">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </button>
    <button class="nav-icon-btn" :class="{ active: activeNav === 'ai' }" @click="activeNav='ai'" title="AI Agent">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </button>
    <button class="nav-icon-btn" :class="{ active: activeNav === 'reports' }" @click="activeNav='reports'" title="Reports">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    </button>
    <button class="nav-icon-btn" :class="{ active: activeNav === 'contacts' }" @click="activeNav='contacts'" title="Contacts">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </button>

    <div class="nav-spacer"></div>

    <button class="nav-icon-btn" title="Search">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="nav-icon-btn" title="Settings">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
    </button>
    <button class="nav-icon-btn" @click="toggleTheme()" :title="theme === 'dark' ? 'Light mode' : 'Dark mode'">
      <template x-if="theme === 'light'">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </template>
      <template x-if="theme === 'dark'">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </template>
    </button>
    <div style="position:relative;margin-top:var(--space-2);" @click="bbLogout()">
      <div class="avatar avatar-sm" :style="`background:var(--accent);cursor:pointer;`" :title="session?.name">
        <span x-text="session?.initials || 'RG'"></span>
        <div class="presence presence-online"></div>
      </div>
    </div>
  </div>

  <!-- Panel 2: Sidebar -->
  <div class="db-panel db-sidebar">
    <div class="db-sidebar-header">
      <div class="db-sidebar-title">Inbox</div>
      <button class="nav-icon-btn" style="width:28px;height:28px;" title="New conversation">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <div style="padding:var(--space-3) var(--space-4);">
      <div style="position:relative;">
        <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="input" type="search" placeholder="Search conversations…" style="padding-left:32px;font-size:var(--text-sm);height:34px;">
      </div>
    </div>

    <div class="sidebar-section-label">My Queue</div>
    <div class="sidebar-item" :class="{ active: sidebarFilter === 'mine' }" @click="sidebarFilter='mine'">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/></svg>
      Your inbox <span class="item-count">4</span>
    </div>
    <div class="sidebar-item" :class="{ active: sidebarFilter === 'mentions' }" @click="sidebarFilter='mentions'">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/></svg>
      Mentions <span class="item-count">0</span>
    </div>
    <div class="sidebar-item" :class="{ active: sidebarFilter === 'created' }" @click="sidebarFilter='created'">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Created by you <span class="item-count">2</span>
    </div>

    <div class="sidebar-section-label">All Conversations</div>
    <div class="sidebar-item" :class="{ active: sidebarFilter === 'all' }" @click="sidebarFilter='all'">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      All <span class="item-count">14</span>
    </div>
    <div class="sidebar-item" :class="{ active: sidebarFilter === 'unassigned' }" @click="sidebarFilter='unassigned'">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.58-7 8-7"/><line x1="18" y1="14" x2="18" y2="20"/><line x1="15" y1="17" x2="21" y2="17"/></svg>
      Unassigned <span class="item-count">3</span>
    </div>
    <div class="sidebar-item" :class="{ active: sidebarFilter === 'ai' }" @click="sidebarFilter='ai'">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      AI Handling <span class="item-count">6</span>
    </div>
    <div class="sidebar-item" :class="{ active: sidebarFilter === 'escalated' }" @click="sidebarFilter='escalated'">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Escalated <span class="item-count">2</span>
    </div>
    <div class="sidebar-item" :class="{ active: sidebarFilter === 'resolved' }" @click="sidebarFilter='resolved'">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Resolved
    </div>

    <div class="sidebar-section-label">Views</div>
    <div class="sidebar-item">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      By company
    </div>
    <div class="sidebar-item">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      By channel
    </div>

    <div style="margin-top:auto;padding:var(--space-4);">
      <div class="sidebar-item" style="border-radius:var(--radius-md);font-size:var(--text-xs);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.06em;">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
        Manage
      </div>
    </div>
  </div>

  <!-- Panel 3: Conversation List -->
  <div class="db-panel db-conv-list">
    <div class="db-conv-header">
      <span style="font-family:var(--font-sans);font-size:var(--text-sm);font-weight:700;color:var(--text-primary);">All</span>
      <div style="display:flex;gap:var(--space-2);">
        <button class="nav-icon-btn" style="width:28px;height:28px;" title="Filter">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        </button>
        <button class="nav-icon-btn" style="width:28px;height:28px;" title="Sort">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
        </button>
      </div>
    </div>
    <div class="conv-filter-tabs">
      <button class="conv-filter-tab" :class="{ active: convFilter === 'all' }" @click="convFilter='all'">All</button>
      <button class="conv-filter-tab" :class="{ active: convFilter === 'Open' }" @click="convFilter='Open'">Open</button>
      <button class="conv-filter-tab" :class="{ active: convFilter === 'AI Handling' }" @click="convFilter='AI Handling'">AI</button>
      <button class="conv-filter-tab" :class="{ active: convFilter === 'Escalated' }" @click="convFilter='Escalated'">Escalated</button>
    </div>

    <template x-for="conv in filteredConversations()" :key="conv.id">
      <div class="conv-card" :class="{ selected: selectedConv?.id === conv.id }" @click="selectConversation(conv)">
        <div class="conv-card-top">
          <div class="avatar avatar-sm" :style="`background:${conv.contact.color};flex-shrink:0;`">
            <span x-text="conv.contact.initials" style="font-size:10px;"></span>
          </div>
          <div class="conv-card-meta">
            <div class="conv-card-name">
              <span x-text="conv.contact.name + ' · ' + conv.company"></span>
              <span class="conv-card-time" x-text="conv.time"></span>
            </div>
            <div class="conv-card-preview" x-text="conv.preview"></div>
            <div class="conv-card-badges">
              <span class="badge badge-sm" :class="CHANNEL_COLORS[conv.channel]" x-text="conv.channel"></span>
              <span class="badge badge-sm" :class="STATUS_COLORS[conv.status]" x-text="conv.status"></span>
            </div>
          </div>
        </div>
        <div class="unread-dot" x-show="conv.unread"></div>
      </div>
    </template>
  </div>

  <!-- Panel 4: Thread -->
  <div class="db-thread">
    <!-- Empty state -->
    <template x-if="!selectedConv">
      <div class="empty-thread">
        <div style="font-size:3rem;margin-bottom:var(--space-4);">🪲</div>
        <div style="font-family:var(--font-sans);font-size:var(--text-lg);font-weight:700;color:var(--text-primary);margin-bottom:var(--space-2);">Select a conversation</div>
        <div style="color:var(--text-muted);font-size:var(--text-sm);max-width:280px;line-height:1.6;">Choose a conversation from the list to view messages and respond.</div>
      </div>
    </template>

    <!-- Thread content -->
    <template x-if="selectedConv">
      <div style="display:flex;flex-direction:column;height:100%;overflow:hidden;">
        <!-- Thread header -->
        <div class="db-thread-header">
          <div class="avatar avatar-sm" :style="`background:${selectedConv.contact.color};flex-shrink:0;`">
            <span x-text="selectedConv.contact.initials" style="font-size:10px;"></span>
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-family:var(--font-sans);font-size:var(--text-sm);font-weight:700;color:var(--text-primary);" x-text="selectedConv.contact.name + ' — ' + selectedConv.company"></div>
            <div style="font-size:var(--text-xs);color:var(--text-muted);" x-text="'via ' + selectedConv.channel + ' · ' + selectedConv.id"></div>
          </div>
          <span class="badge badge-sm" :class="CHANNEL_COLORS[selectedConv.channel]" x-text="selectedConv.channel"></span>
          <span class="badge badge-sm" :class="STATUS_COLORS[selectedConv.status]" x-text="selectedConv.status"></span>
          <button class="btn btn-ghost btn-sm" title="Star">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
          <button class="btn btn-sm" style="background:var(--success);color:white;border-color:var(--success);" @click="closeConversation()">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Close
          </button>
        </div>

        <!-- Messages -->
        <div class="db-thread-messages" id="threadMessages">
          <template x-for="(msg, idx) in selectedConv.messages" :key="msg.id">
            <div>
              <!-- Customer message -->
              <template x-if="msg.type === 'customer'">
                <div class="msg-row customer">
                  <div class="avatar avatar-sm" :style="`background:${selectedConv.contact.color};flex-shrink:0;`">
                    <span x-text="selectedConv.contact.initials" style="font-size:10px;"></span>
                  </div>
                  <div class="msg-bubble-wrap">
                    <div class="msg-sender" x-text="selectedConv.contact.name"></div>
                    <div class="chat-msg chat-msg-agent" x-text="msg.content"></div>
                    <div class="msg-time" x-text="msg.time"></div>
                  </div>
                </div>
              </template>
              <!-- AI message -->
              <template x-if="msg.type === 'ai'">
                <div class="msg-row customer">
                  <div class="avatar avatar-sm" style="background:var(--accent);flex-shrink:0;font-size:14px;">🪲</div>
                  <div class="msg-bubble-wrap">
                    <div class="chat-ai-label">
                      <svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                      AI Agent
                    </div>
                    <div class="chat-msg chat-msg-ai" x-text="msg.content"></div>
                    <div class="msg-time" x-text="msg.time"></div>
                  </div>
                </div>
              </template>
              <!-- Agent message -->
              <template x-if="msg.type === 'agent'">
                <div class="msg-row agent">
                  <div class="avatar avatar-sm" style="background:var(--ink);flex-shrink:0;">
                    <span style="font-size:10px;" x-text="session?.initials || 'RG'"></span>
                  </div>
                  <div class="msg-bubble-wrap">
                    <div class="msg-sender" x-text="session?.name || 'You'"></div>
                    <div class="chat-msg chat-msg-user" x-text="msg.content"></div>
                    <div class="msg-time" x-text="msg.time"></div>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <!-- Streaming AI response (auto-responder) -->
          <template x-if="isAutoResponding">
            <div class="msg-row customer">
              <div class="avatar avatar-sm" style="background:var(--accent);flex-shrink:0;font-size:14px;">🪲</div>
              <div class="msg-bubble-wrap">
                <div class="chat-ai-label">
                  <svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                  AI Agent
                </div>
                <div class="chat-msg chat-msg-ai">
                  <template x-if="streamingText">
                    <span x-text="streamingText"></span>
                  </template>
                  <template x-if="!streamingText">
                    <span><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></span>
                  </template>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- Compose area -->
        <div class="db-compose">
          <div class="compose-tabs">
            <button class="compose-tab" :class="{ active: composeTab === 'reply' }" @click="composeTab='reply'">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
              Reply
            </button>
            <button class="compose-tab" :class="{ active: composeTab === 'note' }" @click="composeTab='note'">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              Internal Note
            </button>
            <button class="compose-tab" :class="{ active: composeTab === 'draft' }" @click="composeTab='draft';generateDraft()">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              AI Draft
            </button>
          </div>
          <div class="compose-body">
            <textarea
              class="textarea"
              x-model="composeText"
              :placeholder="composeTab === 'note' ? 'Add an internal note (not visible to customer)…' : 'Type your reply…'"
              style="min-height:80px;border:none;box-shadow:none;resize:none;padding:0;background:transparent;"
              :style="composeTab === 'draft' && isDraftLoading ? 'opacity:0.5;' : ''"
            ></textarea>
            <template x-if="composeTab === 'draft' && isDraftLoading">
              <div style="display:flex;align-items:center;gap:var(--space-2);color:var(--accent);font-size:var(--text-sm);margin-top:var(--space-2);">
                <svg width="14" height="14" style="animation:spin 1s linear infinite;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.54-5.48"/></svg>
                <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
                Generating AI draft…
              </div>
            </template>
          </div>
          <div class="compose-toolbar">
            <div class="toolbar-icons">
              <button class="toolbar-icon-btn" title="Bold"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg></button>
              <button class="toolbar-icon-btn" title="Italic"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
              <button class="toolbar-icon-btn" title="Link"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>
              <button class="toolbar-icon-btn" title="Attachment"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
            </div>
            <button
              class="btn btn-primary btn-sm"
              @click="sendReply()"
              :disabled="!composeText.trim()"
              :style="!composeText.trim() ? 'opacity:0.4;cursor:not-allowed;' : ''"
            >
              Send
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Panel 5: Right Details/Copilot -->
  <div class="db-panel db-right">
    <div class="db-right-tabs">
      <button class="db-right-tab" :class="{ active: rightTab === 'details' }" @click="rightTab='details'">Details</button>
      <button class="db-right-tab" :class="{ active: rightTab === 'copilot' }" @click="rightTab='copilot';initCopilot()">Copilot</button>
    </div>

    <!-- DETAILS TAB -->
    <template x-if="rightTab === 'details' && selectedConv">
      <div class="db-right-content">
        <!-- Assignment -->
        <div class="detail-row">
          <span class="detail-label">Assignee</span>
          <div style="display:flex;align-items:center;gap:var(--space-2);">
            <div class="avatar avatar-sm" style="background:var(--ink);width:22px;height:22px;font-size:9px;">
              <span x-text="session?.initials || 'RG'"></span>
            </div>
            <span class="detail-value" x-text="session?.name || 'Rohan Garg'"></span>
          </div>
        </div>
        <div class="detail-row">
          <span class="detail-label">Team Inbox</span>
          <span class="detail-value">Support</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Status</span>
          <span class="badge badge-sm" :class="STATUS_COLORS[selectedConv.status]" x-text="selectedConv.status"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">SLA</span>
          <span class="badge badge-sm" :class="selectedConv.sla === 'At risk' ? 'badge-error' : 'badge-success'" x-text="selectedConv.sla"></span>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Conversation attributes
          </div>
          <div class="detail-row"><span class="detail-label">Ticket ID</span><span class="detail-value" x-text="selectedConv.id"></span></div>
          <div class="detail-row">
            <span class="detail-label">Channel</span>
            <span class="badge badge-sm" :class="CHANNEL_COLORS[selectedConv.channel]" x-text="selectedConv.channel"></span>
          </div>
          <div class="detail-row"><span class="detail-label">Company</span><span class="detail-value" x-text="selectedConv.company"></span></div>
          <div class="detail-row">
            <span class="detail-label">Plan</span>
            <span class="badge badge-sm" :class="PLAN_COLORS[selectedConv.plan]" x-text="selectedConv.plan"></span>
          </div>
          <div class="detail-row"><span class="detail-label">Created</span><span class="detail-value">Today</span></div>
          <div style="margin-top:var(--space-3);">
            <div class="detail-label" style="margin-bottom:var(--space-2);">Topics</div>
            <div style="display:flex;flex-wrap:wrap;gap:var(--space-2);">
              <template x-for="topic in selectedConv.topics" :key="topic">
                <span class="badge badge-default badge-sm" x-text="topic"></span>
              </template>
            </div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Customer profile
          </div>
          <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value" x-text="selectedConv.contact.name"></span></div>
          <div class="detail-row"><span class="detail-label">Role</span><span class="detail-value" x-text="selectedConv.contact.role"></span></div>
          <div class="detail-row" style="align-items:flex-start;">
            <span class="detail-label">Email</span>
            <span class="detail-value" style="word-break:break-all;font-size:var(--text-xs);" x-text="selectedConv.contact.email"></span>
          </div>
          <div class="detail-row"><span class="detail-label">Company</span><span class="detail-value" x-text="selectedConv.company"></span></div>
        </div>
      </div>
    </template>

    <!-- Details tab - no conversation selected -->
    <template x-if="rightTab === 'details' && !selectedConv">
      <div class="db-right-content" style="display:flex;align-items:center;justify-content:center;height:100%;">
        <div style="text-align:center;color:var(--text-muted);font-size:var(--text-sm);">
          Select a conversation to see details
        </div>
      </div>
    </template>

    <!-- COPILOT TAB -->
    <template x-if="rightTab === 'copilot'">
      <div style="display:flex;flex-direction:column;height:calc(100vh - 53px);overflow:hidden;">
        <!-- Context banner -->
        <div style="padding:var(--space-3) var(--space-4);background:var(--blue-lightest);border-bottom:1px solid var(--blue-lightest);flex-shrink:0;" x-show="selectedConv">
          <div style="display:flex;align-items:flex-start;gap:var(--space-2);font-size:var(--text-xs);color:var(--blue-dark);">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <span>Copilot has access to this conversation and BitBeetle's knowledge base.</span>
          </div>
        </div>
        <div style="padding:var(--space-3) var(--space-4);background:var(--blue-lightest);border-bottom:1px solid var(--blue-lightest);flex-shrink:0;" x-show="!selectedConv">
          <div style="font-size:var(--text-xs);color:var(--text-muted);">Select a conversation to activate Copilot.</div>
        </div>

        <!-- Copilot messages -->
        <div style="flex:1;overflow-y:auto;padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-3);" id="copilotMessages">
          <template x-if="!selectedConv">
            <div style="text-align:center;color:var(--text-muted);font-size:var(--text-sm);padding:var(--space-8) 0;">
              Open a conversation to start
            </div>
          </template>

          <template x-for="(msg, idx) in copilotMessages" :key="idx">
            <div>
              <template x-if="msg.role === 'assistant'">
                <div style="display:flex;gap:var(--space-2);align-items:flex-end;">
                  <div style="width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;">🪲</div>
                  <div style="max-width:88%;">
                    <div class="chat-ai-label" style="margin-bottom:var(--space-1);">
                      <svg width="9" height="9" fill="currentColor" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                      Copilot
                    </div>
                    <div class="chat-msg chat-msg-ai" style="font-size:var(--text-sm);" x-text="msg.content"></div>
                    <template x-if="msg.hasSuggestion">
                      <button class="btn btn-outline btn-sm" style="margin-top:var(--space-2);font-size:var(--text-xs);" @click="insertSuggestion(msg.suggestion)">
                        Insert as reply
                      </button>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="msg.role === 'user'">
                <div style="display:flex;gap:var(--space-2);align-items:flex-end;justify-content:flex-end;">
                  <div style="max-width:88%;">
                    <div class="chat-msg chat-msg-user" style="font-size:var(--text-sm);" x-text="msg.content"></div>
                  </div>
                  <div class="avatar avatar-sm" style="background:var(--ink);width:24px;height:24px;font-size:10px;flex-shrink:0;">
                    <span x-text="session?.initials || 'RG'"></span>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <!-- Copilot typing indicator -->
          <template x-if="isCopilotLoading">
            <div style="display:flex;gap:var(--space-2);align-items:flex-end;">
              <div style="width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;">🪲</div>
              <div class="chat-msg chat-msg-ai" style="font-size:var(--text-sm);">
                <template x-if="copilotStreamText">
                  <span x-text="copilotStreamText"></span>
                </template>
                <template x-if="!copilotStreamText">
                  <span><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></span>
                </template>
              </div>
            </div>
          </template>
        </div>

        <!-- Copilot input -->
        <div style="padding:var(--space-3) var(--space-4);border-top:1px solid var(--border-subtle);flex-shrink:0;display:flex;gap:var(--space-2);" x-show="selectedConv">
          <input
            class="input"
            x-model="copilotInput"
            placeholder="Ask Copilot…"
            style="font-size:var(--text-sm);flex:1;"
            @keydown.enter.prevent="sendCopilot()"
            :disabled="isCopilotLoading"
          >
          <button class="btn btn-primary btn-sm" @click="sendCopilot()" :disabled="!copilotInput.trim() || isCopilotLoading">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </template>

  </div>
</div><!-- end db-layout -->

</div><!-- end Alpine root -->

<script>
function dashboard() {
  return {
    session: null,
    theme: localStorage.getItem('bb_theme') || 'light',
    activeNav: 'inbox',
    sidebarFilter: 'all',
    convFilter: 'all',
    selectedConv: null,
    rightTab: 'details',
    composeTab: 'reply',
    composeText: '',
    isAutoResponding: false,
    streamingText: '',
    isDraftLoading: false,
    copilotMessages: [],
    copilotInput: '',
    isCopilotLoading: false,
    copilotStreamText: '',
    copilotInitialized: false,

    init() {
      bbGuard();
      this.session = bbGetSession();
      document.documentElement.setAttribute('data-theme', this.theme);
    },

    toggleTheme() {
      this.theme = this.theme === 'light' ? 'dark' : 'light';
      localStorage.setItem('bb_theme', this.theme);
      document.documentElement.setAttribute('data-theme', this.theme);
    },

    filteredConversations() {
      if (this.convFilter === 'all') return MOCK_CONVERSATIONS;
      return MOCK_CONVERSATIONS.filter(c => c.status === this.convFilter);
    },

    selectConversation(conv) {
      this.selectedConv = { ...conv, messages: [...conv.messages] };
      this.composeText = '';
      this.composeTab = 'reply';
      this.streamingText = '';
      this.isAutoResponding = false;
      this.copilotInitialized = false;
      this.copilotMessages = [];

      // Auto-respond if AI Handling and no AI message yet
      const hasAiMsg = conv.messages.some(m => m.type === 'ai');
      if (conv.status === 'AI Handling' && !hasAiMsg) {
        this.$nextTick(() => this.triggerAutoResponse());
      } else {
        this.$nextTick(() => this.scrollThread());
      }
    },

    async triggerAutoResponse() {
      if (!OPENROUTER_CONFIG.apiKey || OPENROUTER_CONFIG.apiKey === '__OPENROUTER_API_KEY__') {
        // Demo mode — add a placeholder AI response
        await new Promise(r => setTimeout(r, 800));
        this.selectedConv.messages.push({
          id: Date.now(), role: 'assistant', type: 'ai',
          content: 'Thank you for reaching out. I\'ve reviewed your issue and I\'m looking into it now. Based on the details you\'ve provided, this appears to be related to a recent configuration change. I\'ll have a full diagnostic ready for you within a few minutes. In the meantime, could you confirm whether this issue started after your most recent deployment?',
          time: 'Just now'
        });
        this.scrollThread();
        return;
      }

      this.isAutoResponding = true;
      this.streamingText = '';
      this.scrollThread();

      const messages = buildAutoResponderMessages(this.selectedConv);
      let fullText = '';

      await streamOpenRouter({
        messages,
        onToken: (token) => {
          fullText += token;
          this.streamingText = fullText;
          this.scrollThread();
        },
        onDone: () => {
          this.isAutoResponding = false;
          this.streamingText = '';
          this.selectedConv.messages.push({
            id: Date.now(), role: 'assistant', type: 'ai',
            content: fullText, time: 'Just now'
          });
          this.$nextTick(() => this.scrollThread());
        },
        onError: (err) => {
          this.isAutoResponding = false;
          this.streamingText = '';
          console.error('AI auto-response error:', err);
        }
      });
    },

    async generateDraft() {
      if (!this.selectedConv) return;
      this.composeText = '';
      this.isDraftLoading = true;

      if (!OPENROUTER_CONFIG.apiKey || OPENROUTER_CONFIG.apiKey === '__OPENROUTER_API_KEY__') {
        await new Promise(r => setTimeout(r, 1000));
        this.composeText = 'Thank you for reaching out about this. I\'ve reviewed your issue and want to help you resolve it as quickly as possible.\n\nBased on what you\'ve described, I recommend checking [specific recommendation based on the issue]. This should address the root cause you\'re experiencing.\n\nPlease let me know if this resolves the issue or if you need any further assistance.';
        this.isDraftLoading = false;
        return;
      }

      const messages = buildDraftMessages(this.selectedConv);
      let fullText = '';

      await streamOpenRouter({
        messages,
        onToken: (token) => {
          fullText += token;
          this.composeText = fullText;
        },
        onDone: () => { this.isDraftLoading = false; },
        onError: (err) => { this.isDraftLoading = false; console.error('Draft error:', err); }
      });
    },

    sendReply() {
      if (!this.composeText.trim() || !this.selectedConv) return;
      const msg = {
        id: Date.now(), role: 'assistant',
        type: this.composeTab === 'note' ? 'agent' : 'agent',
        content: this.composeText.trim(), time: 'Just now'
      };
      this.selectedConv.messages.push(msg);
      this.composeText = '';
      this.composeTab = 'reply';
      this.$nextTick(() => this.scrollThread());
    },

    closeConversation() {
      if (this.selectedConv) {
        this.selectedConv.status = 'Resolved';
      }
    },

    async initCopilot() {
      if (!this.selectedConv || this.copilotInitialized) return;
      this.copilotInitialized = true;
      this.isCopilotLoading = true;
      this.copilotStreamText = '';

      const systemMsg = `You are reviewing a support ticket. Here is the conversation:\n\n${this.selectedConv.messages.map(m => `${m.type === 'customer' ? 'Customer' : 'Agent'}: ${m.content}`).join('\n\n')}\n\nPlease provide: 1) A brief analysis of the issue, 2) A suggested reply the agent can send. Label the reply clearly as "Suggested reply:".`;

      if (!OPENROUTER_CONFIG.apiKey || OPENROUTER_CONFIG.apiKey === '__OPENROUTER_API_KEY__') {
        await new Promise(r => setTimeout(r, 1200));
        const suggestion = `Thank you for flagging this. I've reviewed the issue and I believe the root cause is a configuration mismatch introduced in the latest deployment. I'd recommend reverting the recent change to the ${this.selectedConv.topics[0] || 'affected'} configuration and testing again. If the issue persists, I can escalate this to engineering with a full diagnostic package.`;
        this.copilotMessages.push({
          role: 'assistant',
          content: `I've reviewed this ticket from ${this.selectedConv.contact.name} at ${this.selectedConv.company}. This is a ${this.selectedConv.status === 'Escalated' ? 'high-priority' : 'standard'} issue on their ${this.selectedConv.plan} plan.\n\nSuggested reply:\n${suggestion}`,
          hasSuggestion: true,
          suggestion
        });
        this.isCopilotLoading = false;
        this.$nextTick(() => this.scrollCopilot());
        return;
      }

      const messages = [{ role: 'user', content: systemMsg }];
      const copilotSystemPrompt = `You are BitBeetle Copilot, helping a support agent. Be concise and label suggested replies clearly as "Suggested reply:".`;
      messages.unshift({ role: 'system', content: copilotSystemPrompt });

      let fullText = '';
      await streamOpenRouter({
        messages,
        onToken: (token) => {
          fullText += token;
          this.copilotStreamText = fullText;
          this.scrollCopilot();
        },
        onDone: () => {
          this.isCopilotLoading = false;
          this.copilotStreamText = '';
          const suggestionMatch = fullText.match(/Suggested reply:\s*([\s\S]+?)(?:\n\n|$)/i);
          this.copilotMessages.push({
            role: 'assistant', content: fullText,
            hasSuggestion: !!suggestionMatch,
            suggestion: suggestionMatch ? suggestionMatch[1].trim() : ''
          });
          this.$nextTick(() => this.scrollCopilot());
        },
        onError: (err) => { this.isCopilotLoading = false; console.error('Copilot init error:', err); }
      });
    },

    async sendCopilot() {
      if (!this.copilotInput.trim() || !this.selectedConv) return;
      const userMsg = this.copilotInput.trim();
      this.copilotInput = '';
      this.copilotMessages.push({ role: 'user', content: userMsg });
      this.isCopilotLoading = true;
      this.copilotStreamText = '';
      this.$nextTick(() => this.scrollCopilot());

      if (!OPENROUTER_CONFIG.apiKey || OPENROUTER_CONFIG.apiKey === '__OPENROUTER_API_KEY__') {
        await new Promise(r => setTimeout(r, 900));
        this.copilotMessages.push({
          role: 'assistant',
          content: `Based on the conversation context and BitBeetle's knowledge base, here's my response to your question about "${userMsg}":\n\nI would recommend addressing the customer's concern directly by checking the ${this.selectedConv.topics[0] || 'relevant'} configuration. Would you like me to draft a more formal or technical version of the reply?`,
          hasSuggestion: false
        });
        this.isCopilotLoading = false;
        this.$nextTick(() => this.scrollCopilot());
        return;
      }

      const historyForApi = this.copilotMessages.slice(0, -1).map(m => ({ role: m.role, content: m.content }));
      historyForApi.push({ role: 'user', content: userMsg });
      const messages = buildCopilotMessages(this.selectedConv, historyForApi);

      let fullText = '';
      await streamOpenRouter({
        messages,
        onToken: (token) => {
          fullText += token;
          this.copilotStreamText = fullText;
          this.scrollCopilot();
        },
        onDone: () => {
          this.isCopilotLoading = false;
          this.copilotStreamText = '';
          const suggestionMatch = fullText.match(/Suggested reply:\s*([\s\S]+?)(?:\n\n|$)/i);
          this.copilotMessages.push({
            role: 'assistant', content: fullText,
            hasSuggestion: !!suggestionMatch,
            suggestion: suggestionMatch ? suggestionMatch[1].trim() : ''
          });
          this.$nextTick(() => this.scrollCopilot());
        },
        onError: (err) => { this.isCopilotLoading = false; console.error('Copilot error:', err); }
      });
    },

    insertSuggestion(suggestion) {
      this.composeText = suggestion;
      this.composeTab = 'reply';
      this.rightTab = 'details';
    },

    scrollThread() {
      const el = document.getElementById('threadMessages');
      if (el) el.scrollTop = el.scrollHeight;
    },

    scrollCopilot() {
      const el = document.getElementById('copilotMessages');
      if (el) el.scrollTop = el.scrollHeight;
    }
  };
}
</script>
</body>
</html>
